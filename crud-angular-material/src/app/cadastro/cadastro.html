<div fxLayout="row" fxLayoutAlign="center">
    <div fxLayout="column" fxFlex="1000px">
         <form class="mt-60" #clientesFrm="ngForm" (ngSubmit)="salvar()">
            <mat-card>
                <mat-card-header>
                    <mat-card-title>Dados pessoais</mat-card-title>
                </mat-card-header>
                <mat-card-content class="mt-20">
                    <div fxLayout="row" fxLayoutAlign="start" fxLayoutGap="16px">
                        <div fxLayout="column" fxFlex="800px">
                            <mat-form-field class="full-width">
                                <mat-label>Nome: *</mat-label>
                                <input type="text" name="nome" [(ngModel)]="cliente.nome" placeholder="Ex: Marilu Cavalieri" matInput />
                            </mat-form-field>
                        </div>
                    </div>
                    <div fxLayout="row" fxLayoutAlign="start" fxLayoutGap="16px">
                        <div fxLayout="column" fxFlex="800px">
                            <mat-form-field class="full-width">
                                <mat-label>Email: *</mat-label>
                                <input type="email" name="email" [(ngModel)] = "cliente.email" placeholder="Ex: pirulito@gostoso.com.br" matInput />
                            </mat-form-field>
                        </div>
                    </div> 
                    <div fxLayout="row" fxLayoutAlign="start" fxLayoutGap="16px">
                        <div fxLayout="column" fxFlex="400px">
                            <mat-form-field class="full-width">
                                <mat-label>CPF: *</mat-label>
                                <input type="text" maxlength="14" name="cpf" [(ngModel)] = "cliente.cpf" (keyup)="aplicarFormatacao()" placeholder="somente numeros" matInput />
                            </mat-form-field>
                        </div>
                    </div> 
                    <div fxLayout="row" fxLayoutAlign="start" fxLayoutGap="16px">
                        <div fxLayout="column" fxFlex="400px">
                            <mat-form-field class="full-width">
                                <mat-label>Data nascimento: *</mat-label>
                                <input type="number" name="dataNascimento" [(ngModel)]="cliente.dataNascimento" placeholder="Ex: 01101991" matInput />
                            </mat-form-field>
                        </div>
                    </div> 
                </mat-card-content>
                <mat-card-actions>

                    <div fxLayout="row">
                            <button mat-flat-button color="primary" type="submit" (click)="salvar()">
                                <mat-icon fontIcon="save"></mat-icon>
                                Salvar
                            </button>  
                            <button mat-flat-button color="primary" class="ml-5">
                                <mat-icon fontIcon="refresh"></mat-icon>
                                Atualizar
                            </button>      
                            
                            <button mat-flat-button color="accent" class="ml-5" (click)="limpar()">
                                <mat-icon fontIcon="backspace"></mat-icon>
                                Limpar
                            </button>      
                    </div>

                </mat-card-actions>
            </mat-card>
         </form>
    </div>
</div>
